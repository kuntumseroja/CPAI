# CAPA AI - Supporting Services (Podman)
# Run: podman compose up -d
# Or: podman-compose up -d

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: capa-ai-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-capa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-capa_secret}
      POSTGRES_DB: ${POSTGRES_DB:-capa_ai}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U capa -d capa_ai || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: capa-ai-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/"]
      interval: 10s
      timeout: 5s
      retries: 3

  # vLLM - requires NVIDIA GPU (optional)
  # Run with: podman compose --profile vllm up -d
  vllm:
    image: vllm/vllm-openai:latest
    container_name: capa-ai-vllm
    profiles:
      - vllm
    ports:
      - "8001:8000"
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
    volumes:
      - huggingface_cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command: --model meta-llama/Llama-3.2-3B-Instruct --max-model-len 2048
    restart: unless-stopped

volumes:
  postgres_data:
  qdrant_data:
  huggingface_cache:
